<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mdsee</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="header-wrapper" id="app-header">
    <div class="header-area">
      <div class="header-left">
        <button class="sidebar-toggle-btn" id="toggleSidebarBtn" title="切换侧边栏">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" /><line x1="9" y1="3" x2="9" y2="21" />
          </svg>
        </button>
        <div class="header-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#03a9f4" stroke-width="2">
            <path d="M4 4h16v16H4z" /><path d="M7 15V9l3 3 3-3v6" />
            <path d="M17 9v6" /><path d="M17 13l-2-2" /><path d="M17 13l2-2" />
          </svg>
          <strong class="header-title">mdsee</strong>
        </div>
      </div>
      <nav class="header-actions">
        <button class="action-btn" id="btnNewFile" title="新建文件 (Ctrl+N)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
            <polyline points="14 2 14 8 20 8" /><line x1="12" y1="18" x2="12" y2="12" /><line x1="9" y1="15" x2="15" y2="15" />
          </svg>
        </button>
        <button class="action-btn" id="btnOpenFile" title="打开文件 (Ctrl+O)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
          </svg>
        </button>
        <button class="action-btn" id="btnOpenFolder" title="打开文件夹 (Ctrl+Shift+O)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
            <line x1="12" y1="11" x2="12" y2="17" /><line x1="9" y1="14" x2="15" y2="14" />
          </svg>
        </button>
        <button class="action-btn" id="btnSaveFile" title="保存 (Ctrl+S)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" />
          </svg>
        </button>
        <div class="action-divider"></div>
        <button class="action-btn" id="btnExportPdf" title="导出 PDF">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
            <polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" />
          </svg>
        </button>
        <button class="action-btn" id="btnExportHtml" title="导出 HTML">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" />
          </svg>
        </button>
        <div class="action-divider"></div>
        <button class="action-btn" id="btnTheme" title="切换主题">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        </button>
        <button class="action-btn" id="btnFullscreen" title="全屏 (F11)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9" /><polyline points="9 21 3 21 3 15" />
            <line x1="21" y1="3" x2="14" y2="10" /><line x1="3" y1="21" x2="10" y2="14" />
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- 主体区域 -->
  <div class="app-body">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-panel" id="sidebarPanel">
        <div class="sidebar-header">
          <span class="sidebar-title">文档列表</span>
          <button class="sidebar-collapse-btn" id="collapseSidebarBtn" title="收起侧边栏">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="11 17 6 12 11 7" /><polyline points="18 17 13 12 18 7" />
            </svg>
          </button>
        </div>
        <!-- 文件夹路径显示 -->
        <div class="sidebar-folder" id="sidebarFolder" style="display:none">
          <span class="sidebar-folder-name" id="folderName" title=""></span>
          <button class="sidebar-folder-close" id="btnCloseFolder" title="关闭文件夹">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="sidebar-list" id="docList"></div>
        <div class="sidebar-footer">
          <button class="new-doc-btn" id="btnNewDoc">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            <span>新建文档</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- 编辑器区域 -->
    <div class="editor-wrapper" id="editorWrapper">
      <div id="vditor" class="vditor-container"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
